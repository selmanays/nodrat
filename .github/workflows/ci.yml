name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # API — Lint (ruff check + ruff format)  (#39)
  # NOT: black --check kaldırıldı — ruff-format ile 65 dosyada çelişiyordu
  # (ikisi de --check → lint ASLA yeşil olamıyordu). ruff = tek formatter (#1030).
  # ===========================================================================
  api-lint:
    name: API lint (ruff + black)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: Relationship pattern lint (T8 precondition 1 — Phase 8 PR-8b-4)
        # AST guard: relationship() positional args must be string class names,
        # not class references. Catches class-form regression at lint time.
        run: python scripts/lint_relationship_pattern.py

      - name: mypy (warn-only — Faz 0 strict typing iteratif)
        run: mypy app
        continue-on-error: true

  # ===========================================================================
  # API — Unit tests (no integration, no provider call)  (#39)
  # ===========================================================================
  api-unit-tests:
    name: API unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: apps/api
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://nodrat:test@localhost:5432/nodrat
      REDIS_URL: redis://localhost:6379/0
      API_SECRET_KEY: test-secret-key-32-byte-hex-test
      JWT_SECRET: test-jwt-secret
      FERNET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest unit (testcontainers fixture'larını skip eden marker)
        run: pytest tests/unit/ -v --cov=app --cov-report=term -m "unit or not integration"

  # ===========================================================================
  # API — Eval (golden set runner, provider call YOK)  (#39)
  # ===========================================================================
  api-eval:
    name: API eval (golden sets)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: apps/api
    env:
      ENVIRONMENT: development
      API_SECRET_KEY: test-secret-key-32-byte-hex-test
      JWT_SECRET: test-jwt-secret
      FERNET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest eval (golden sets, no provider call)
        run: pytest tests/eval/ -v -m "eval or not integration" --no-cov

  # ===========================================================================
  # Web — Lint (ESLint via next lint)  (#39)
  # ===========================================================================
  web-lint:
    name: Web lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

      - name: Vitest unit tests (P7a PR-7a-0 — frontend characterization)
        run: npm run test

  # ===========================================================================
  # Web — Build (Next.js production build)  (#39)
  # ===========================================================================
  web-build:
    name: Web build (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Next.js production build
        run: npm run build

  # ===========================================================================
  # Migrations syntax — alembic versions/ ast.parse  (#39)
  # ===========================================================================
  migrations-syntax:
    name: Migrations syntax (ast.parse)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate alembic migrations syntax
        run: |
          python - <<'PY'
          import ast
          import pathlib
          import sys

          versions = pathlib.Path("apps/api/alembic/versions")
          if not versions.exists():
              print("alembic versions/ yok, skip")
              sys.exit(0)

          failures = []
          checked = 0
          for migration in sorted(versions.glob("*.py")):
              checked += 1
              try:
                  ast.parse(migration.read_text(encoding="utf-8"), filename=str(migration))
              except SyntaxError as exc:
                  failures.append((migration, exc))

          for migration, exc in failures:
              print(f"FAIL {migration}: {exc}")

          print(f"Checked {checked} migration(s); {len(failures)} failure(s)")
          sys.exit(1 if failures else 0)
          PY

  # ===========================================================================
  # Docker Compose validate (mevcut iş — korunur)
  # ===========================================================================
  compose:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose --env-file .env config > /dev/null
          echo "docker-compose.yml is valid"

      - name: Validate dev override
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env config > /dev/null
          echo "dev override is valid"

  # ===========================================================================
  # Docs link check (mevcut iş — korunur)
  # ===========================================================================
  docs:
    name: Docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check INDEX.md exists
        run: test -f INDEX.md && echo "INDEX.md exists"

      - name: Check critical docs exist
        run: |
          for doc in \
            docs/product/prd.md \
            docs/product/information-architecture.md \
            docs/strategy/risk-register.md \
            docs/engineering/architecture.md \
            docs/engineering/data-model.md \
            docs/engineering/api-contracts.md \
            docs/engineering/prompt-contracts.md \
            docs/engineering/modular-monolith-architecture.md \
            docs/engineering/refactor-playbook.md \
            docs/engineering/testing-strategy.md \
            docs/legal/compliance-brief.md \
            docs/legal/opinion-integration.md; do
            test -f "$doc" || (echo "MISSING: $doc"; exit 1)
            echo "OK $doc"
          done

  # ===========================================================================
  # Import Linter — Modular Monolith boundary enforcement (Phase 1+)
  # Strict scope: app.modules.* + app.shared.*
  # Legacy app.core.* + app.api.* are out of contract scope in Phase 1.
  # See: wiki/decisions/import-direction-rules.md
  # ===========================================================================
  lint-imports:
    name: Import boundary check (modular monolith)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run import-linter against contracts in pyproject.toml
        run: lint-imports --config pyproject.toml

  # ===========================================================================
  # Alembic check — schema drift guard (DB-based, Phase 8 PR-8b-1 + Phase 8.2)
  # Steps:
  #   1. offline: exactly one head exists; history graph parses (env import OK)
  #   2. DB-based (disposable pgvector Postgres 16 service):
  #      a. alembic upgrade head — apply full migration chain to a fresh DB
  #         Failure = broken migration (DDL error, missing extension, bad order)
  #      b. alembic check — autogenerate diff = 0 strict gate (Phase 8.2 PR-8.2-13)
  #         Failure = ORM model metadata drift vs live DB schema
  #
  # Phase 8.2 ORM Completion (12 implementation PRs + 2 NO-OP closure docs)
  # closed all 53 baseline drift items (PR-8.2-1..12). The strict gate is now
  # enabled (PR-8.2-13). raw-SQL only tables (article_chunks, chat_cache_telemetry,
  # entities, pmf_survey_responses) excluded via `include_object` filter in env.py.
  #
  # T8 ön-şart 5 (autogenerate diff = 0) — gate aktif. T8 model relocation #1087
  # blocked → unblocked transition when this job passes on main.
  # See: wiki/decisions/deploy-schema-drift-hardening.md
  #      wiki/topics/phase8-2-orm-completion-mini-plan.md
  # ===========================================================================
  alembic-check:
    name: Alembic schema check (DB-based)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: apps/api
    env:
      # Disposable Postgres 16 below provides this DB. asyncpg DSN — alembic
      # env.py uses async_engine_from_config().
      DATABASE_URL: postgresql+asyncpg://nodrat:test@localhost:5432/nodrat_alembic
    services:
      postgres:
        # pgvector image (pgvector/pgvector:pg16) bundles the `vector`
        # extension required by alembic migration 20260501_1900_init_extensions
        # which runs `CREATE EXTENSION vector`. Plain postgres:16 lacks it.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nodrat
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nodrat_alembic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nodrat -d nodrat_alembic"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: alembic heads — exactly one head expected
        run: |
          set -e
          heads_count=$(alembic heads 2>/dev/null | grep -cE '^[a-z0-9]+' || true)
          if [ "$heads_count" -ne 1 ]; then
            echo "ERROR: expected exactly one alembic head, found ${heads_count}"
            alembic heads
            exit 1
          fi
          echo "OK: exactly one alembic head"
          alembic heads

      - name: alembic history (env import + revision graph)
        run: alembic history | head -20

      - name: alembic upgrade head — apply full migration chain to disposable DB
        run: |
          set -e
          alembic upgrade head
          echo "OK: upgrade head completed"

      - name: alembic check — autogenerate diff = 0 strict gate (Phase 8.2 PR-8.2-13)
        run: |
          set -e
          # Compares ORM model metadata against live DB schema (after upgrade head
          # applied all migrations to disposable Postgres 16 + pgvector).
          # Phase 8.2 PR-8.2-1..12 closed all 53 baseline drift items:
          #   PR-8.2-1:  modify_comment (6 column)
          #   PR-8.2-2:  UniqueConstraint (7)
          #   PR-8.2-3:  articles indexes (8)
          #   PR-8.2-4:  agenda_cards indexes (4 + 1 add_index fix)
          #   PR-8.2-5:  messages + style indexes (4)
          #   PR-8.2-6:  auth indexes (4)
          #   PR-8.2-7:  ops/billing/jobs indexes (7)
          #   PR-8.2-8:  NO-OP (event/training residual = 0)
          #   PR-8.2-9:  takedown.evidence_urls modify_nullable (1)
          #   PR-8.2-10: NO-OP (pgvector dep already in pyproject.toml since Faz 0)
          #   PR-8.2-11: pgvector cols agenda + event (4: 2 col + 2 ivfflat idx)
          #   PR-8.2-12: pgvector col articles.summary_embedding (2: 1 col + 1 idx)
          # raw-SQL only tables (article_chunks, chat_cache_telemetry, entities,
          # pmf_survey_responses) excluded via RAW_SQL_ONLY_TABLES allowlist in
          # apps/api/alembic/env.py include_object filter.
          # Failure = ORM/DB drift surfaced; either:
          #   - Fix the ORM model __table_args__ / mapped_column to match DB
          #   - Or extend RAW_SQL_ONLY_TABLES allowlist (justification required)
          # T8 ön-şart 5 — autogenerate diff must be 0.
          alembic check
          echo "OK: alembic check passed (0 drift) — T8 ön-şart 5 GREEN"
