name: Deploy to VPS

# =============================================================================
# Issue: #40 — GitHub Actions deploy (SSH to VPS)
# Issue: #1108 — Make VPS deploy wait for main CI success (workflow_run gating)
# Issue: #1114 — Skip VPS deploy for docs/wiki-only changes (two-job gating)
#
# Tetikleyici:
#   - workflow_run: "CI" workflow main branch'inde completed olduğunda
#     (conclusion=='success' şart). #1108: CI hangi commit için pass olduysa
#     o EXACT commit deploy edilir (workflow_run.head_sha pinning).
#   - Release tag (v*.*.*) → optional production rollout (CI workflow_run +
#     #1114 docs-skip bypass — tag deploy mevcut davranışı korunur)
#   - workflow_dispatch (manuel rerun fallback; #1114 docs-skip bypass —
#     manuel her zaman deploy)
#
# İki-job yapısı (#1114 — production environment gate koruması):
#   1. detect-deploy-needed
#      - environment YOK (ungated; her event'te ucuz koşar)
#      - workflow_dispatch + push (tag) → skip_deploy=false (always deploy)
#      - workflow_run + docs-only → skip_deploy=true
#      - workflow_run + code/workflow/infra → skip_deploy=false
#      - gh api fail / empty → skip_deploy=false (safe default — production
#        güvenliği gereksiz skip'ten daha önemli)
#   2. deploy-vps
#      - needs: detect-deploy-needed
#      - environment: production (manuel approval gate burada)
#      - job-level if: skip_deploy != 'true' AND event eligible
#      - docs-only durumda job tamamen SKIPPED → environment gate
#        tetiklenmez → approval istenmez
#
# Required GitHub Secrets (`gh secret set ...`):
#   VPS_SSH_KEY            — Private key (ed25519) PEM içeriği
#   VPS_KNOWN_HOSTS        — `ssh-keyscan -p 22 164.68.107.205` çıktısı
#   VPS_HOST               — 164.68.107.205   (Cloud VPS 40 NVMe)
#   VPS_PORT               — 22
#   VPS_USER               — root
#   VPS_PATH               — /opt/nodrat
#   SLACK_WEBHOOK_URL      — (opsiyonel) deploy bildirimi için
#
# Required GitHub Environment:
#   `production`           — Settings → Environments → Required reviewers
#                            ile manuel approval gate. Sadece deploy-vps
#                            job'unda; detect job ungated.
# =============================================================================

on:
  # #1108 — Deploy CI başarısı sonrası tetiklenir (push:main yerine).
  # workflow_run event'i CI'ın HEAD_SHA'sını taşır → o EXACT commit deploy edilir.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Tag deploy mevcut davranış (release rollout — CI workflow_run gating dışı):
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Deploy edilecek ref (branch / tag / sha)"
        required: false
        default: "main"

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # JOB 1: detect-deploy-needed (ungated — runs cheaply on every trigger)
  # ===========================================================================
  detect-deploy-needed:
    name: Detect whether deploy is needed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # NO environment — bu job production gate öncesi koşar; docs-only
    # tespiti environment approval'ı tetiklemeden yapılır.
    outputs:
      skip_deploy: ${{ steps.decide.outputs.skip_deploy }}
    steps:
      - name: Determine skip_deploy
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # #1114 — Trigger-aware decision:
          #   - workflow_dispatch + push (tag) → skip_deploy=false (always deploy)
          #   - workflow_run only: gh api changed files check
          set -uo pipefail  # NOT -e — safe default behavior

          EVENT="${{ github.event_name }}"
          echo "=== detect-deploy-needed (event=$EVENT) ==="

          # workflow_dispatch + push (tag) — always deploy
          if [ "$EVENT" != "workflow_run" ]; then
            echo "Manual/tag event — skip_deploy=false (deploy proceeds)"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_run path
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Triggering CI URL: ${{ github.event.workflow_run.html_url }}"
          echo "CI conclusion:     ${{ github.event.workflow_run.conclusion }}"
          echo "CI head_sha:       ${SHA}"
          echo ""
          echo "=== Changed files in commit ${SHA:0:8} ==="

          if ! FILES=$(gh api /repos/${{ github.repository }}/commits/$SHA --jq '.files[].filename' 2>&1); then
            echo "::warning::gh api failed: $FILES — defaulting to skip_deploy=false (safe: deploy proceeds)"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$FILES" ]; then
            echo "::warning::Empty changed files list — defaulting to skip_deploy=false (safe: deploy proceeds)"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$FILES"
          echo ""

          # Docs/wiki patterns (skip):
          #   wiki/**                                  (Obsidian vault)
          #   docs/**                                  (Markdown docs)
          #   **/*.md                                  (any markdown — README, INDEX, CHANGELOG, etc.)
          #   .github/PULL_REQUEST_TEMPLATE/**         (PR templates)
          # Non-docs patterns (deploy):
          #   apps/**, infra/**, docker-compose*.yml
          #   .github/workflows/**                     (self-change → deploy required)
          #   .env.example, .gitignore, pyproject.toml, etc.
          NON_DOCS=$(echo "$FILES" | grep -vE '^(wiki/|docs/|\.github/PULL_REQUEST_TEMPLATE/|[^/]*\.md$|.*/[^/]*\.md$)' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "::notice::Docs/wiki-only change detected; deploy will be skipped."
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Code/workflow/infra paths detected — deploy proceeds. Non-docs files:"
            echo "$NON_DOCS"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # JOB 2: deploy-vps (production environment gate — only runs when deploy needed)
  # ===========================================================================
  deploy-vps:
    name: Deploy to VPS (production)
    needs: detect-deploy-needed
    runs-on: ubuntu-latest
    # #1114 — Job-level gating (production environment entered ONLY when deploy needed):
    #   - skip_deploy != 'true' (docs-only durumda hiç çalışmaz; environment
    #     approval tetiklenmez)
    # AND
    # #1108 — Event-eligibility check:
    #   1. workflow_dispatch        — Manuel deploy (her zaman çalışır)
    #   2. push (tag)               — Release rollout (CI bypass; mevcut davranış)
    #   3. workflow_run + success   — CI başarılı oldu → deploy çalışır
    # CI fail / cancelled olursa workflow_run trigger fire eder ama
    # conclusion != 'success' → job SKIPPED → production'a kırık kod çıkmaz.
    if: |
      needs.detect-deploy-needed.outputs.skip_deploy != 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push' ||
       (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    environment:
      name: production
      url: https://nodrat.com
    timeout-minutes: 25

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PATH: ${{ secrets.VPS_PATH }}

    steps:
      - name: Resolve deploy target (head_sha pinning for workflow_run)
        id: target
        run: |
          # #1108 — Trigger-specific SHA resolution:
          #   - workflow_run: github.event.workflow_run.head_sha → CI'ın
          #     verify ettiği EXACT commit. Main bu arada ilerlediyse
          #     (yeni un-verified commit eklendiyse) deploy ESKİ (verify
          #     edilmiş) commit'i çıkar — sessiz "newer-but-unverified"
          #     deploy önlenir.
          #   - workflow_dispatch: kullanıcı ref input'u veya "main"
          #   - push (tag): github.sha (tag commit'i)
          TARGET_SHA="${{ github.event.workflow_run.head_sha || github.event.inputs.ref || github.sha }}"
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Deploy target resolution ==="
          echo "Event:             ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggering CI URL: ${{ github.event.workflow_run.html_url }}"
            echo "CI conclusion:     ${{ github.event.workflow_run.conclusion }}"
            echo "CI head_branch:    ${{ github.event.workflow_run.head_branch }}"
            echo "CI head_sha:       ${{ github.event.workflow_run.head_sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Dispatch ref:      ${{ github.event.inputs.ref }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "Push ref:          ${{ github.ref }}"
          fi
          echo "Resolved target:   ${TARGET_SHA}"

      - name: Checkout (target SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.target_sha }}
          fetch-depth: 1

      - name: Verify checked-out SHA matches target
        run: |
          # #1108 acceptance: deploy edilen commit = CI head_sha
          CHECKED_OUT=$(git rev-parse HEAD)
          TARGET="${{ steps.target.outputs.target_sha }}"
          echo "Checked-out HEAD: ${CHECKED_OUT}"
          echo "Target SHA:       ${TARGET}"
          # workflow_run.head_sha = tam 40-char SHA (strict match).
          # workflow_dispatch ref'i branch ismi veya tag olabilir → relaxed.
          case "${TARGET}" in
            main|HEAD|refs/*)
              echo "Target is ref name (workflow_dispatch fallback) — strict SHA match skipped"
              ;;
            *)
              if [ "${CHECKED_OUT}" != "${TARGET}" ]; then
                echo "FATAL: checked-out HEAD (${CHECKED_OUT}) != target SHA (${TARGET})"
                exit 1
              fi
              echo "Deploy target verified: SHA pinning OK"
              ;;
          esac
          echo ""
          echo "=== Deploying commit ==="
          git log -1 --pretty=format:"SHA:    %H%nAuthor: %an <%ae>%nDate:   %aI%nTitle:  %s"

      - name: Setup ssh-agent (VPS_SSH_KEY)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH keepalive (#1509 — uzun build pipe-drop koruması)
        run: |
          # Uzun/sessiz adımlar (özellikle ~10dk Next.js `npm run build`)
          # runner→VPS SSH oturumunu idle-timeout ile düşürebiliyor →
          # `client_loop: send disconnect: Broken pipe` + exit 255 → deploy fail
          # (2026-06-15 #1503 deploy'unda gözlendi). ~/.ssh/config'e keepalive
          # yaz: sonraki TÜM ssh + rsync(-e ssh) çağrıları bunu default miras
          # alır (her komuta -o serpiştirmeye gerek yok). 30s × 10 = 300s tolerans.
          mkdir -p ~/.ssh
          printf 'Host *\n  ServerAliveInterval 30\n  ServerAliveCountMax 10\n' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: rsync (apps/, infra/, compose, alembic)
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="__pycache__" \
            --exclude=".pytest_cache" \
            --exclude=".ruff_cache" \
            --exclude=".mypy_cache" \
            --exclude="*.pyc" \
            -e "ssh -p ${VPS_PORT} -o StrictHostKeyChecking=yes" \
            apps infra docker-compose.yml docker-compose.dev.yml .env.example \
            "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/"

      - name: Decrypt .env via sops (VPS-side, opsiyonel)
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "bash -se" <<'EOSSH'
            set -euo pipefail
            cd "${VPS_PATH:-/opt/nodrat}"
            if [ -f infra/.env.encrypted ] && command -v sops >/dev/null 2>&1 \
               && [ -f /etc/sops/age/keys.txt ]; then
              SOPS_AGE_KEY_FILE=/etc/sops/age/keys.txt \
                sops --decrypt infra/.env.encrypted > .env
              chmod 600 .env
              echo "sops decrypt OK"
            else
              echo "sops/age yok ya da .env.encrypted yok — mevcut .env kullanılacak"
            fi
          EOSSH

      - name: Docker compose build (api + web + workers + scheduler)
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "bash -se" <<'EOSSH'
            set -euo pipefail
            cd "${VPS_PATH:-/opt/nodrat}"
            docker compose --env-file .env build \
              api web worker_scraper worker_cleaner worker_embedding worker_image_vlm worker_rag scheduler
          EOSSH

      - name: Docker compose up -d
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "bash -se" <<'EOSSH'
            set -euo pipefail
            cd "${VPS_PATH:-/opt/nodrat}"
            docker compose --env-file .env up -d \
              postgres redis minio api web \
              worker_scraper worker_cleaner worker_embedding worker_image_vlm worker_rag scheduler
            docker compose ps
          EOSSH

      - name: Alembic migrate + verify at head (anti schema-drift)
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "bash -se" <<'EOSSH'
            set -euo pipefail
            cd "${VPS_PATH:-/opt/nodrat}"
            # Hardening-v2: alembic ÖNCESİ api'yi ZORLA yeni imajla yeniden
            # yarat. Kanıtlı kör-nokta: 'up -d' bazen api'yi eski container'da
            # korur (image-digest/timing) → 'docker compose exec api alembic'
            # ESKİ migration dosyalarına bakar, current==heads(ESKİ) ile
            # SESSİZCE geçer (20260519_0100 deploy'da uygulanmadı; manuel
            # kurtarıldı). --force-recreate → exec daima YENİ kod/migration
            # dosyalarına vurur → alttaki current==heads assert'i ANLAMLI.
            # --no-deps: postgres/redis YENİDEN BAŞLATILMAZ (veri güvenliği).
            docker compose --env-file .env up -d --force-recreate --no-deps api
            # YENİ api container hazır olana kadar maks 120sn bekle
            for i in $(seq 1 24); do
              if docker compose exec -T api python -c "print('ok')" >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done
            # --- Repo-türevli EXPECTED head (deployed kodun beklediği revision) ---
            # Kör-nokta kökü (#1505/#1507): eski assert current'i container'ın
            # KENDİ `alembic heads`'ine bağladı. Stale container (image-digest/
            # timing) eski migration dosyalarını içerince heads=eski_rev,
            # current=eski_rev → upgrade no-op → current==heads ile SESSİZCE
            # geçti (20260615_1200 deploy'da uygulanMADI, manuel kurtarıldı).
            # Fix: beklenen head'i rsync'lenmiş REPO'dan al (en yeni migration
            # dosyasının revision'ı; chronological YYYYMMDD_HHMM naming = linear
            # head, CI tek-head enforce eder) → container heads'ine bağlı DEĞİL.
            LATEST_FILE=$(ls -1 apps/api/alembic/versions/[0-9]*.py 2>/dev/null | sort | tail -1)
            if [ -z "${LATEST_FILE}" ]; then
              echo "FATAL: rsync'lenmiş repo'da migration dosyası yok (apps/api/alembic/versions) — deploy DURDURULUYOR"
              exit 1
            fi
            LATEST_BASENAME=$(basename "${LATEST_FILE}")
            EXPECTED_HEAD=$(grep -E '^revision' "${LATEST_FILE}" | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
            if [ -z "${EXPECTED_HEAD}" ]; then
              echo "FATAL: ${LATEST_BASENAME} içinden revision çıkarılamadı — deploy DURDURULUYOR"
              exit 1
            fi
            echo "Beklenen head (repo: ${LATEST_BASENAME}): ${EXPECTED_HEAD}"

            # --- Stale-image guard: container deployed migration DOSYASINI
            # gerçekten içeriyor mu? İçermiyorsa force-recreate'i bir kez daha
            # dene (image-digest/timing). Hâlâ yoksa LOUD fail. ---
            for attempt in 1 2 3; do
              if docker compose exec -T api test -f "alembic/versions/${LATEST_BASENAME}"; then
                break
              fi
              echo "api container '${LATEST_BASENAME}' içermiyor (stale image, deneme ${attempt}/3) — force-recreate tekrar"
              docker compose --env-file .env up -d --force-recreate --no-deps api
              for i in $(seq 1 24); do
                docker compose exec -T api python -c "print('ok')" >/dev/null 2>&1 && break
                sleep 5
              done
            done
            if ! docker compose exec -T api test -f "alembic/versions/${LATEST_BASENAME}"; then
              echo "FATAL: api container deployed migration '${LATEST_BASENAME}' içermiyor (stale image) — deploy DURDURULUYOR"
              exit 1
            fi

            # --- Migration'ı uygula + EXPECTED_HEAD'e ulaşana kadar doğrula ---
            # Incident kökü: bu adım şemayı UYGULAMADAN "başarılı" geçiyordu.
            # Bundan sonra current != EXPECTED_HEAD => deploy LOUD fail. Genel:
            # tüm gelecek migration'ları kapsar (tek kolon/rev hardcode YOK).
            APPLIED=0
            for attempt in 1 2; do
              docker compose exec -T api alembic upgrade head
              CUR=$(docker compose exec -T api alembic current 2>/dev/null | awk 'NR==1{print $1}')
              echo "alembic current=<${CUR}> beklenen=<${EXPECTED_HEAD}> (deneme ${attempt})"
              if [ "${CUR}" = "${EXPECTED_HEAD}" ]; then
                APPLIED=1
                break
              fi
              echo "current != expected — 5s bekle, upgrade tekrar"
              sleep 5
            done
            if [ "${APPLIED}" != "1" ]; then
              echo "FATAL: migration uygulanmadı (current=${CUR}, expected=${EXPECTED_HEAD}) — sessiz schema-drift, deploy DURDURULUYOR"
              exit 1
            fi
            echo "Schema verified: DB at expected head ${EXPECTED_HEAD}"
            # --- App-ready gate (PR #1339 / #1137 dersi — false-fail timing) ---
            # Yukarıdaki 'python -c print(ok)' YALNIZ interpreter'ı doğrular;
            # uvicorn app lifespan (model import + settings_store warm + DB pool)
            # daha uzun sürer. force-recreate sonrası api cold-start bazen public
            # smoke'un 60s penceresinden uzun → 502 false-fail (T8-15 #1339: job
            # FAILURE ama prod sağlıklı; 1-2dk sonra /health=200). Bu loop
            # nginx/Cloudflare katmanını BYPASS edip api-container-İÇİ HTTP
            # /health'i ölçer → app gerçekten 200 dönene kadar bekler. api
            # gerçekten ölü/kırıksa 180s'de LOUD fail (false-negative koruması).
            echo "=== api app-ready bekleniyor (internal HTTP /health, maks 180s) ==="
            APP_READY=0
            for i in $(seq 1 36); do
              if docker compose exec -T api python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)" >/dev/null 2>&1; then
                echo "api internal /health=200 (attempt ${i}) — app-ready"
                APP_READY=1
                break
              fi
              echo "api not ready yet (attempt ${i}/36), 5s bekle..."
              sleep 5
            done
            if [ "${APP_READY}" != "1" ]; then
              echo "FATAL: api 180s icinde internal /health=200 vermedi — app-ready DEGIL, deploy DURDURULUYOR"
              docker compose ps api || true
              docker compose logs --tail 50 api || true
              exit 1
            fi
          EOSSH

      - name: Smoke test (curl /health)
        run: |
          set -euo pipefail
          # Cloudflare → nginx → api proxy üzerinden public URL.
          # Önceki SSH step api-container-içi /health=200'ü zaten doğruladı
          # (app-ready gate); buradaki retry'lar yalnız Cloudflare/nginx edge
          # warm-up + DNS propagation payı. Pencere 60s → 120s (12×10s):
          # PR #1339 (T8-15) false-fail dersi — api app-ready olsa bile public
          # zincir birkaç saniye geç 200 dönebiliyordu; LOUD fail yalnız
          # gerçek edge/proxy sorununda (12 deneme = 120s).
          for i in $(seq 1 12); do
            status=$(curl -fsS -o /tmp/health.json -w "%{http_code}" \
              https://nodrat.com/health || echo "000")
            if [ "$status" = "200" ]; then
              cat /tmp/health.json
              echo ""
              echo "Smoke test passed (HTTP 200) — attempt ${i}"
              exit 0
            fi
            echo "attempt $i — status=$status, retrying in 10s"
            sleep 10
          done
          echo "Smoke test FAILED after 12 attempts (120s) — public /health 200 vermedi"
          exit 1

      - name: Slack notification — success (placeholder)
        if: success()
        run: |
          # #1108 — Slack'te raporlanan SHA = gerçekten deploy edilen SHA.
          # workflow_run trigger'da github.sha deploy.yml dosyasının main'deki
          # SHA'sını gösterir (yanıltıcı); target_sha = CI head_sha kullan.
          # #1114 — Bu job zaten docs-only durumda hiç çalışmaz (job-level if);
          # Slack'i step-level guard'a gerek yok.
          DEPLOYED_SHA="${{ steps.target.outputs.target_sha }}"
          DEPLOYED_REF="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\":rocket: Nodrat deploy succeeded — \`${DEPLOYED_SHA}\` on ${DEPLOYED_REF}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          else
            echo "SLACK_WEBHOOK_URL secret yok — bildirim atlandı"
          fi

      - name: Slack notification — failure (placeholder)
        if: failure()
        run: |
          # #1108 — failure raporunda da target_sha kullan.
          # #1114 — Bu job zaten docs-only durumda hiç çalışmaz (job-level if).
          DEPLOYED_SHA="${{ steps.target.outputs.target_sha }}"
          DEPLOYED_REF="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\":x: Nodrat deploy FAILED — \`${DEPLOYED_SHA}\` on ${DEPLOYED_REF} — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          else
            echo "SLACK_WEBHOOK_URL secret yok — bildirim atlandı"
          fi
