name: agenda_card_golden
description: |
  Agenda Card Generator golden set (#44).

  10 örnek — bir event cluster + ona ait articles listesi → tek bir
  "gündem kartı" (title, summary, key_points, source_refs, status,
  importance/freshness scores). Schema referansı:
  docs/engineering/prompt-contracts.md §3.

  Her case schema seviyesinde validation için tasarlanmıştır:
    - title_max_chars (200)
    - summary_min/max_chars (300/500)
    - key_points_min/max (3..5)
    - source_refs_count_eq (her article 1 entry)
    - status_in [developing|active|cooling|stale]
    - importance_score_range / freshness_score_range
    - manual_review_required (true → halu detector LLM-as-judge stub)

  Runtime LLM çağrısı yok; runner sadece YAML şemasının tutarlılığını
  ve case'lerin gerekli alanlarını doğrular (run_agenda_card_eval stub).

test_type: agenda_card

cases:
  - id: ac_001_chp_economy_active
    input:
      event_cluster:
        id: "11111111-1111-1111-1111-111111111111"
        canonical_title: "CHP'den ekonomi politikalarına eleştiriler"
        first_seen_at: "2026-04-28T10:00:00+03:00"
        last_seen_at: "2026-05-01T18:00:00+03:00"
        article_count: 7
        source_count: 4
      articles:
        - id: "a1"
          title: "CHP genel başkanından ekonomi açıklaması"
          source_name: "BBC Türkçe"
          source_reliability: 0.85
          published_at: "2026-04-28T11:00:00+03:00"
          clean_text_excerpt: "CHP genel başkanı pazartesi günü..."
          url: "https://example.com/a1"
        - id: "a2"
          title: "CHP grup toplantısında erken seçim çağrısı"
          source_name: "DW Türkçe"
          source_reliability: 0.82
          published_at: "2026-04-30T14:30:00+03:00"
          clean_text_excerpt: "Parti yönetimi toplantıda..."
          url: "https://example.com/a2"
      current_time: "2026-05-01T20:00:00+03:00"
    expected:
      title_max_chars: 200
      summary_min_chars: 300
      summary_max_chars: 500
      key_points_min: 3
      key_points_max: 5
      source_refs_count_eq: 2
      status_in: ["developing", "active"]
      importance_score_range: [0.5, 1.0]
      freshness_score_range: [0.7, 1.0]
      hallucination_rate_max: 0.0
      manual_review_required: true

