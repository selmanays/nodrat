name: content_generator_golden
description: |
  Content Generator golden set (#44).

  20 örnek — plan + agenda cards + style profile → kullanıcıya sunulacak
  X paylaşımı / thread / özet üretimi. Schema referansı:
  docs/engineering/prompt-contracts.md §4.

  Variant dağılımı:
    - x_post     : 12 case (varsayılan üretim)
    - x_thread   :  4 case
    - summary    :  2 case
    - comparison :  2 case (iki dönemli posts)

  Schema validation hedefleri:
    - posts[].char_count <= 280
    - posts[].related_agenda_card_ids non-empty
    - sources non-empty (show_sources=true ise)
    - warnings list type
    - thread variant'ında 4-12 post arası
    - comparison variant'ında comparison_summary + differences alanları

  Bu YAML'da agenda_cards üst düzeyde özetlendi (gerçek üretim ortamında
  agenda_card_golden.yaml veya runtime fixture verilir). Runner şu an
  struct-only validation yapar (run_content_eval), runtime LLM çağrısı yok.

test_type: content_generation

cases:
  # ==========================================================================
  # X Post (12)
  # ==========================================================================

  - id: cg_001_xpost_neutral_3
    input:
      request: "Bugünkü ekonomi gündemiyle 3 X paylaşımı üret"
      retrieval_plan:
        intent: "current_content_generation"
        mode: "current"
        output_type: "x_post"
        topic_query: "ekonomi"
        tone: null
      agenda_cards:
        - id: "ac_001"
          title: "Merkez Bankası faiz kararı"
          summary: "TCMB faiz kararı açıklaması..."
      output_constraints:
        output_type: "x_post"
        max_posts: 3
        tone: null
        length: "short"
        show_sources: true
        language: "tr"
    expected:
      variant: "x_post"
      posts_count_max: 3
      post_char_max: 280
      posts_related_cards_min: 1
      sources_min: 1
      warnings_type: list

