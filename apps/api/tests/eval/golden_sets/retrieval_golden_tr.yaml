name: retrieval_golden_tr
description: |
  Türkçe gündem haberlerinden 50 sorgu × ortalama 1-3 relevant agenda_card.
  Production'daki gerçek agenda card'lar üzerinden hazırlandı (2026-05-01/02).

  - "id": agenda_cards.id (UUID, production'da var)
  - "relevance": 1.0 = birincil hedef, 0.5 = ilgili (partial match)
  - relevance > 0 olan tüm card'lar "qrels" sayılır

  Format: ranx-uyumlu (qrels dict + run dict üzerinden NDCG/MAP/MRR/Recall).

test_type: retrieval
metrics:
  - ndcg@10
  - map@5
  - mrr@10
  - recall@20

