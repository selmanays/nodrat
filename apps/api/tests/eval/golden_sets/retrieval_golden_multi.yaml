name: retrieval_golden_multi
description: |
  #619 PR-D1 — ÇOK-BİLEŞENLİ golden-quality genişletme (10→30).

  PR-C reality-analysis: eski 10-query set kuyruk-kalibre + dar (N=10, 2-relevant/q
  → recall adımı 0.50) + popüler-UUID-ağırlıklı → güvenilmez ölçüm. Bu genişletme:
  - 30 query, 5 sınıf dengeli (10 should_split / 8 should_not_split / 2
    heuristic_out_of_scope / 3 split_but_needs_cleaning / 7 llm_or_ambiguous)
  - kuyruklu + kuyruksuz dengeli (noise-strip artefaktını izole etmek için)
  - niş konu ağırlıklı (ALES/SAHA/Şanlıurfa/iklim/ABD-İran), popüler azaltıldı
  - relevant UUID'ler MEVCUT retrieval_golden_tr.yaml'den reuse — YENİ card/UUID YOK

  Şema (her query):
  - expected_decompose: should_split | should_not_split | split_but_needs_cleaning
    | heuristic_out_of_scope | llm_or_ambiguous (decompose_trigger_cases.yaml ile aynı set)
  - rationale: kısa gerekçe
  - low_confidence (opsiyonel): popüler-konu / tek-snapshot relevant → recall sahte-düşük
    riski. relevant UUID DEĞİŞTİRİLMEZ, yalnız işaretlenir.
  (NOT: eski `decompose: heuristic|llm` alanı kaldırıldı → tek-etiket expected_decompose.)

  ⚠️ DÜRÜSTLÜK — local'de recall ANLAMSIZ: relevant UUID prod-snapshot (2026-05-01/02).
  Bu set ÖLÇÜM ARACI; CI yalnız parse + sınıf-dağılım + UUID-reuse + heuristic-expectation
  doğrular (recall DEĞİL). Gerçek recall prod-corpus + ayrı onay ister.

  ⚠️ GOLDEN-KALİBRASYON ARTEFAKTI (PR-C bulgusu): heuristic relevant'lar golden_tr'de
  kuyruklu query-forma kalibre olabilir → noise-strip kuyruksuz alt-sorguları haksız
  cezalandırır (mq_007 = kuyruksuz-relevant doğal kontrol). Aktivasyon kararı bu
  artefakt dikkate alınmadan verilmemeli. low_confidence + kuyruklu/kuyruksuz denge
  bu artefaktı izole etmeye yardımcı olur.

test_type: retrieval
metrics:
  - ndcg@10
  - map@5
  - mrr@10
  - recall@20

