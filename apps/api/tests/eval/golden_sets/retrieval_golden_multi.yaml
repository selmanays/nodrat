name: retrieval_golden_multi
description: |
  #619 PR-4B — ÇOK-BİLEŞENLİ (multi-query) golden subset.

  Query decomposition'ın retrieval-katkısını ölçmek için 10 çok-konulu TR
  haber/research sorgusu. Mevcut retrieval_golden_tr.yaml'deki gerçek
  agenda_card UUID'leri BİRLEŞTİRİLEREK üretildi — yeni card/DB/veri YOK.

  decompose alanı (benchmark KULLANMAZ; dokümantasyon + test içindir):
  - "heuristic": ` ve / ayrıca ` marker'lı → decompose_heuristic deterministik böler
  - "llm": virgüllü/örtük çok-niyet → marker yok, LLM-fallback gerekir

  ⚠️ DÜRÜSTLÜK — local'de recall ANLAMSIZ olabilir:
  relevant id'ler agenda_cards.id (UUID), yalnız PRODUCTION snapshot'ında
  (2026-05-01/02) var. Local/dev corpus'ta bu card'lar YOKsa retrieval miss
  = sahte-düşük recall. Bu subset bir ÖLÇÜM ARACI; gerçek recall ölçümü
  prod-corpus (canary, onay+restore) veya snapshot-yüklü ortam ister.
  Local'de yalnız heuristic-split + şema doğrulanır (recall değil).

  Format: retrieval_golden_tr.yaml ile aynı (ranx-uyumlu qrels).

test_type: retrieval
metrics:
  - ndcg@10
  - map@5
  - mrr@10
  - recall@20

