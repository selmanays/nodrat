# Alembic config — Nodrat API
# docs/engineering/data-model.md §1.1

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
timezone = UTC

# DB URL env'den okunur (alembic/env.py içinde override edilir)
# sqlalchemy.url = driver://user:pass@host/dbname

# File template — timestamp prefix
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[post_write_hooks]
hooks = ruff_check
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
