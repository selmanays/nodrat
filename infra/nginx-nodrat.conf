# =============================================================================
# Nodrat — nginx server block (mevcut nginx config'e eklenecek)
#
# Bu dosya VPS'teki MEVCUT nginx kurulumuna nodrat.com vhost ekler.
# Caddy yerine nginx kullanırız çünkü VPS'te zaten nginx 80/443'i tutuyor.
#
# Kurulum (VPS'te):
#   sudo cp infra/nginx-nodrat.conf /etc/nginx/sites-available/nodrat
#   sudo ln -s /etc/nginx/sites-available/nodrat /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 🚫 PRE-LAUNCH: arama motorları indekslemesin
#    X-Robots-Tag: noindex, nofollow header HER ENDPOINT'te.
#    Launch sonrası bu satırı kaldır.
# =============================================================================

upstream nodrat_web {
    server 127.0.0.1:3010;
    keepalive 16;
}

upstream nodrat_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# HTTP — Cloudflare zaten TLS termination yapar
# Cloudflare → Origin (HTTP/HTTPS) → nginx → docker
server {
    listen 80;
    listen [::]:80;
    server_name nodrat.com www.nodrat.com;

    # Cloudflare'in real IP'sini al
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ---- Pre-launch: arama motorları engelle ----
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Server identity gizle
    server_tokens off;

    # ---- Logging (mevcut nginx'i etkilemesin diye nodrat-spesifik log) ----
    access_log /var/log/nginx/nodrat-access.log;
    error_log /var/log/nginx/nodrat-error.log warn;

    # ---- Body limit ----
    client_max_body_size 10M;

    # ---- robots.txt — Pre-launch koruma ----
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ---- API routes ----
    location /api/ {
        proxy_pass http://nodrat_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts (LLM çağrıları uzun sürebilir)
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- Health endpoints (admin debug için) ----
    location ~ ^/(health|readiness)$ {
        proxy_pass http://nodrat_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ---- Web app (Next.js) ----
    location / {
        proxy_pass http://nodrat_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- Next.js static assets (cache) ----
    location /_next/static/ {
        proxy_pass http://nodrat_web;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Aynı noindex header
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
