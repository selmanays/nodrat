# =============================================================================
# Nodrat — nginx server block (mevcut nginx config'e eklenecek)
#
# Mevcut VPS pattern'i takip eder:
#   - Cloudflare Full SSL → sslh:443 (SSH+TLS multiplexer)
#   - sslh → nginx 127.0.0.1:4443 (SSL termination)
#   - nginx → docker container'lar (3010 web, 8000 api)
#
# Kurulum:
#   sudo cp infra/nginx-nodrat.conf /etc/nginx/sites-available/nodrat
#   sudo ln -s /etc/nginx/sites-available/nodrat /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 🚫 PRE-LAUNCH: arama motorları indekslemesin (X-Robots-Tag header
#    her response'da). Launch sonrası kaldır.
# =============================================================================

# ============================================================================
# HTTP listener (port 80) — Cloudflare HTTP edge + ACME challenges
# ============================================================================
server {
    listen 80;
    server_name nodrat.com www.nodrat.com;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # 🚫 PRE-LAUNCH noindex (LAUNCH SONRASI KALDIR)
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # Security headers (#249)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    server_tokens off;

    access_log /var/log/nginx/nodrat-access.log;
    error_log /var/log/nginx/nodrat-error.log warn;

    client_max_body_size 10M;

    # robots.txt — Pre-launch koruma (static)
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Auth endpoints — sıkı rate-limit (#244 brute-force koruması)
    # Zone tanımı: /etc/nginx/conf.d/nodrat-ratelimit.conf (auth_limit 5r/m)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password|verify-email) {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    # API — genel rate-limit (#244)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    # Health endpoints
    location ~ ^/(health|readiness)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Web (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }
}

# ============================================================================
# HTTPS listener (127.0.0.1:4443) — sslh terminate eder buraya gönderir
# ============================================================================
server {
    listen 127.0.0.1:4443 ssl;
    server_name nodrat.com www.nodrat.com;

    # SSL cert (self-signed, Cloudflare Full SSL için)
    # Kurulumdan önce: openssl req -x509 -nodes -newkey rsa:2048 \
    #   -keyout /etc/nginx/ssl/nodrat.key -out /etc/nginx/ssl/nodrat.crt \
    #   -days 825 -subj "/CN=nodrat.com"
    ssl_certificate /etc/nginx/ssl/nodrat.crt;
    ssl_certificate_key /etc/nginx/ssl/nodrat.key;

    # Cloudflare real IP (aynı liste)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # 🚫 PRE-LAUNCH noindex
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # Security headers (HSTS HTTPS'de) (#249)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    server_tokens off;

    access_log /var/log/nginx/nodrat-access.log;
    error_log /var/log/nginx/nodrat-error.log warn;

    client_max_body_size 10M;

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Auth endpoints — sıkı rate-limit (#244 brute-force koruması)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password|verify-email) {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    # API — genel rate-limit (#244)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    location ~ ^/(health|readiness)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }
}
