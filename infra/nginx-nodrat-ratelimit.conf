# =============================================================================
# Nodrat — nginx rate-limit zones (#244, MVP-1.1)
#
# Bu snippet /etc/nginx/conf.d/ altında olmalı (http {} block'a include edilir).
# Server-level `limit_req zone=...` directive'leri sites-available/nodrat'da.
#
# Kurulum:
#   sudo cp infra/nginx-nodrat-ratelimit.conf /etc/nginx/conf.d/nodrat-ratelimit.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Zone tanımları:
#   - auth_limit  : 5 r/m per IP (brute-force koruması — login, register, password)
#   - api_limit   : 60 r/m per IP (genel /api/* trafiği)
#
# Memory: 10MB her zone (~160K unique IP track edebilir).
# =============================================================================

# Aşıldığında 429 Too Many Requests (default 503 yerine — semantically correct)
limit_req_status 429;

# Auth endpoint'leri — sıkı (brute-force korumas)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Genel API trafiği
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
