# =============================================================================
# Nodrat — Docker Compose (production-ready, VPS izolasyon uyumlu)
#
# ⚠️ VPS İZOLASYONU:
# Bu VPS'te başka uygulamalar çalışıyorsa port çakışması olmasın diye:
#   - TÜM container/volume/network adları "nodrat-" / "nodrat_" prefix'li
#   - Default port'lar (80, 443, 5432, 6379, 9000) kullanılmıyor
#   - Üst seviye reverse proxy (mevcut nginx/Caddy) Caddy:8443'e forward eder
#   - Postgres/Redis/MinIO sadece internal network'te (host'a expose YOK production'da)
#
# Başlatma:
#   docker compose --env-file .env up -d
#
# docs/engineering/architecture.md §2
# =============================================================================

name: nodrat                                # COMPOSE_PROJECT_NAME ile uyumlu

services:
  caddy:
    image: caddy:2-alpine
    container_name: nodrat-caddy
    restart: unless-stopped
    ports:
      # Production: mevcut reverse proxy 80/443'ten Nodrat'ın
      # 8080/8443 portlarına forward eder. Port çakışması yok.
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - nodrat_caddy_data:/data
      - nodrat_caddy_config:/config
      # #331 — Cloudflare Origin CA cert (host /opt/nodrat/secrets/origin-cert)
      # Dizin yoksa volume mount fail eder; deploy öncesi VPS'te yaratılmalı
      - ./secrets/origin-cert:/etc/caddy/origin-cert:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
    networks:
      - nodrat_edge
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nodrat-web
    restart: unless-stopped
    # runaway-guard (Next.js SSR; gözlem ~42M, 1G cap bol headroom).
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      NEXT_PUBLIC_API_URL: http://nodrat-caddy:80/api
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - nodrat_edge
    # Sadece dev'de host'a expose; production'da Caddy üzerinden erişim
    ports:
      - "${WEB_PORT:-3000}:3000"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-api
    restart: unless-stopped
    # graceful shutdown: SIGTERM'de aktif (LLM streaming) request'leri 25s drain
    # et; stop_grace_period 30s (25 + 5s buffer). Aksi halde docker default 10s
    # aşılır → "failed to exit within 10s of signal 15 - force kill" → yarım
    # streaming yanıt (her deploy/restart log'unda görülüyordu). uvicorn 0.49 OK.
    stop_grace_period: 30s
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
        "--timeout-graceful-shutdown",
        "25",
      ]
    # runaway-guard (gözlem peak ~1.6G; 4G cap host-OOM koruması, normal işleyişi
    # etkilemez — sadece kaçak büyümeyi sınırlar).
    deploy:
      resources:
        limits:
          memory: 4G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
      MINIO_ENDPOINT: nodrat-minio:9000
    networks:
      - nodrat_edge
      - nodrat_internal
    ports:
      # Sadece dev. Production'da Caddy proxy yeterli.
      - "${API_PORT:-8000}:8000"
    volumes:
      # bge-m3 model cache (#163) — paylaşılır volume, tüm api+worker'lar
      - hf_cache:/opt/hf-cache
      # #570 — admin disk panel (docker df + builder prune). Trade-off:
      # api container compromise = host docker daemon erişimi. Mitigation:
      # endpoint'ler require_admin gated + audit log her cleanup'a.
      - /var/run/docker.sock:/var/run/docker.sock
    # #577 — Container nodrat user (uid=1000) docker socket (root:docker 660)
    # erişimi için host docker grup gid'ini ekle. Contabo VPS 40'ta gid=988;
    # başka host'a göç edilirse `getent group docker | cut -d: -f3` ile teyit.
    group_add:
      - "988"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nodrat-postgres
    restart: unless-stopped
    # #256 → #684 PR-A — max_connections 300 → 500.
    # 7 container × (pool 10 + overflow 20) = 210 max demand + workers
    # concurrency 4 ile ek paralellik → 300 sınırı dar geliyordu (TooMany
    # ConnectionsError paralel rechunk testlerinde).
    # 7 container × 15 pool +
    # admin/migration/health probe için yedek. RAM impact ~10MB/conn × 200
    # ek = ~2GB (VPS 47GB yedek dahilinde).
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nodrat}
      POSTGRES_USER: ${POSTGRES_USER:-nodrat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    volumes:
      - nodrat_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nodrat_internal
    # Production'da bu PORTS satırını YORUM YAPIN — host'a expose etmeyin
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nodrat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nodrat-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - nodrat_redis_data:/data
    networks:
      - nodrat_internal
    # Production'da YORUM YAPIN
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test:
        ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nodrat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - nodrat_minio_data:/data
    networks:
      - nodrat_internal
    # Production'da YORUM YAPIN — sadece admin IP allowlist için Caddy üzerinden
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker_scraper:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-scraper
    restart: unless-stopped
    # concurrency 2→4: crawl I/O-bound (RSS/HTTP fetch ağ beklemesi, CPU değil)
    # → ~300 kaynak haber-gecikmesini düşürür. embedding worker'ları thread-pin'li
    # (#1621) olduğundan ek CPU baskısı minimal. max-tasks-per-child: uzun-ömürlü
    # child memory birikimini sınırla (model yüklemiyor → recycle ucuz).
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "crawl_queue,media_queue",
        "--concurrency=4",
        "--loglevel=info",
        "--max-tasks-per-child=500",
      ]
    deploy:
      resources:
        limits:
          memory: 2G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
      MINIO_ENDPOINT: nodrat-minio:9000
    # #239 — celery worker liveness (inspect ping broker üzerinden)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # nodrat_edge: scraper internet erişimi gerekir (RSS, robots.txt, image fetch)
      - nodrat_edge
      - nodrat_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_cleaner:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-cleaner
    restart: unless-stopped
    # max-tasks-per-child: uzun-ömürlü child memory birikimini sınırla (model yok).
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "cleaning_queue",
        "--concurrency=2",
        "--loglevel=info",
        "--max-tasks-per-child=500",
      ]
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
    # #239 — celery worker liveness (inspect ping broker üzerinden)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nodrat_internal
      # cleaner internet'e ihtiyaç duymaz (lokal text process)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_embedding:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-embedding
    restart: unless-stopped
    # #684 PR-A — concurrency 1→4 (bulk re-chunk, re-NER, embedding parallel).
    # CPU-bound workload (sentence-transformers local bge-m3). 12 vCPU VPS'te
    # 4 paralel embedding call optimal (RAM constraints + DB pool karşılık).
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "embedding_queue",
        "--concurrency=4",
        "--loglevel=info",
      ]
    # NOT: max-tasks-per-child KASITLI YOK — bu worker bge-m3'ü RAM'de tutar;
    # child recycle = model yeniden yükleme = latency spike (#1621 kazanımını bozar).
    # Memory koruması cap ile sağlanıyor (gözlem peak ~3.3G; 8G runaway-guard).
    deploy:
      resources:
        limits:
          memory: 8G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
      # #1621 — CPU thread pinning. bge-m3 (sentence-transformers/torch) CPU
      # inference; pin'siz her process torch default=nproc(12) thread alır →
      # 6 embedding process × 12 = 72 thread / 12 vCPU = oversubscription thrash
      # → her chunk_article 20-68s (tasarım ~100ms). Pin=1: process başına 1 core,
      # thrash yok, aggregate throughput ↑. EMBEDDING_TORCH_THREADS → provider
      # torch.set_num_threads (OMP/MKL/OpenBLAS env'i numpy/BLAS katmanını kapsar).
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
      EMBEDDING_TORCH_THREADS: "1"
    # #239 — celery worker liveness (inspect ping broker üzerinden)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # embedding local bge-m3 (#163) — internet sadece ilk model download
      - nodrat_edge
      - nodrat_internal
    volumes:
      # bge-m3 model cache (#163) shared volume
      - hf_cache:/opt/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # #893 — Taze (yeni ingest) makaleler için ADANMIŞ embed lane.
  # Yalnız `embedding_fast_queue` tüketir (clean ANINDA tetiklenen
  # chunk_article→embed_article_chunks fast zinciri). Bulk re-chunk/
  # re-embed/maintenance/sft/backfill paylaşılan `embedding_queue`'da
  # kalır → taze haber FIFO'da bulk arkasında beklemez (clean→aranabilir
  # dakikalar → saniyeler). Aynı image/env/model; concurrency=4 (#1621 —
  # thread-pin sonrası taze lane'i güçlendir; eski conc=2 + thrash =
  # 564 backlog). worker_embedding bulk'a devam; bu düşse
  # backfill-missing-chunks (15dk, normal kuyruk) güvenlik ağı yakalar.
  worker_embedding_fast:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-embedding-fast
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "embedding_fast_queue",
        "--concurrency=4",
        "--loglevel=info",
      ]
    # NOT: max-tasks-per-child KASITLI YOK (bkz. worker_embedding — model reload).
    # Memory cap (gözlem peak ~4.0G; 8G runaway-guard).
    deploy:
      resources:
        limits:
          memory: 8G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
      # #1621 — Bkz. worker_embedding: thread pinning (thrash fix). Taze haber
      # lane'i kullanıcıya-dönük gecikme açısından kritik → concurrency 2→4
      # (pin=1 sonrası 4 fast + 4 bulk = 8 CPU-bound thread / 12 vCPU; cleaner/
      # api için ~4 core headroom). Fast prio-9 backlog'u (clean→aranabilir) bu drenajlar.
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
      EMBEDDING_TORCH_THREADS: "1"
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nodrat_edge
      - nodrat_internal
    volumes:
      - hf_cache:/opt/hf-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_image_vlm:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-image-vlm
    restart: unless-stopped
    # #300 PR-3 — NIM VLM image processing (process & discard)
    # Concurrency=2 (NIM 40 RPM, 2 worker × 30s avg = 4 jobs/min OK)
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "image_vlm_queue",
        "--concurrency=2",
        "--loglevel=info",
        "--max-tasks-per-child=500",
      ]
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # NIM API'ye internet erişimi
      - nodrat_edge
      - nodrat_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_rag:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-rag
    restart: unless-stopped
    # #684 PR-A — concurrency 2→4 (NER batch + agenda + cluster parallel).
    # event_queue (NER + cluster + agenda + raptor) bulk operations için.
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "event_queue,generation_queue",
        "--concurrency=4",
        "--loglevel=info",
        "--max-tasks-per-child=500",
      ]
    # RAPTOR/agenda/cluster batch'leri burst'te ~4.5G + yüksek CPU → child recycle
    # leak'i geri kazanır; model yüklemiyor (recycle ucuz). 8G runaway-guard.
    deploy:
      resources:
        limits:
          memory: 8G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
    # #239 — celery worker liveness (inspect ping broker üzerinden)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # rag worker DeepSeek/Claude/etc LLM provider'a çıkar
      - nodrat_edge
      - nodrat_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # #1531 — ADANMIŞ NER worker. Entity extraction (DeepSeek LLM) gerçek-zamanlı
  # taze haberler için event_queue'daki ağır agenda/raptor/cluster batch'lerine
  # starve OLMAMALI → ayrı `ner_queue`. clean→entity gecikmesini ~4 saatten
  # dakikalara indirir. concurrency 4 (LLM I/O-bound; ingestion << kapasite).
  worker_ner:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-worker-ner
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "-Q",
        "ner_queue",
        "--concurrency=4",
        "--loglevel=info",
        "--max-tasks-per-child=500",
      ]
    deploy:
      resources:
        limits:
          memory: 2G
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodrat}:${POSTGRES_PASSWORD}@nodrat-postgres:5432/${POSTGRES_DB:-nodrat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # ner worker DeepSeek LLM provider'a çıkar
      - nodrat_edge
      - nodrat_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nodrat-scheduler
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@nodrat-redis:6379/0
    # #239 — celery beat'in inspect ping muadili yok (broker'a görev publish eder,
    # consume etmez). Process liveness Docker PID 1 ile zaten kontrol ediliyor;
    # ek healthcheck noise yaratıyor → disable.
    healthcheck:
      disable: true
    networks:
      - nodrat_internal
    depends_on:
      redis:
        condition: service_healthy

# =============================================================================
# Networks (prefix'li, çakışmaz)
# =============================================================================
networks:
  nodrat_edge:
    name: nodrat_edge
    driver: bridge
  nodrat_internal:
    name: nodrat_internal
    internal: true
    driver: bridge

# =============================================================================
# Volumes (prefix'li, çakışmaz)
# =============================================================================
volumes:
  nodrat_postgres_data:
    name: nodrat_postgres_data
  nodrat_redis_data:
    name: nodrat_redis_data
  nodrat_minio_data:
    name: nodrat_minio_data
  nodrat_caddy_data:
    name: nodrat_caddy_data
  nodrat_caddy_config:
    name: nodrat_caddy_config
  hf_cache:
    name: nodrat_hf_cache
    # bge-m3 model cache (#163) — api+worker_embedding+worker_rag paylaşır
    # İlk start ~60-90s download, sonraki start'lar 0s
